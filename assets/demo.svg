  <g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.030;0.042;0.9;1" calcMode="linear"/><text x="28.0" y="104.0" fill="#34d3b0" font-weight="700">$</text><text x="46.7" y="104.0" fill="#e6edf3" font-weight="400">judgecal demo --n 150 --bias position=0.8 --seed 7</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.069;0.081;0.9;1" calcMode="linear"/><text x="28.0" y="156.0" fill="#7aa2f7" font-weight="700"># Judge Reliability Card — mock-judge  (planted position=0.8)</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.108;0.120;0.9;1" calcMode="linear"/><text x="28.0" y="182.0" fill="#8b98ac" font-weight="400">Scale: 150 items · 2400 judgments · 5 probes</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.147;0.159;0.9;1" calcMode="linear"/><text x="28.0" y="234.0" fill="#7aa2f7" font-weight="700">## Summary</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.186;0.198;0.9;1" calcMode="linear"/><text x="28.0" y="260.0" fill="#f87171" font-weight="700">●</text><text x="46.7" y="260.0" fill="#c9d4e5" font-weight="400">Position bias detected — first answer picked 64.7%</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.225;0.237;0.9;1" calcMode="linear"/><text x="46.7" y="286.0" fill="#8b98ac" font-weight="400">of the time   (95% CI 60.3%–69.2%,   q = 0.002)</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.264;0.276;0.9;1" calcMode="linear"/><text x="28.0" y="312.0" fill="#fbbf24" font-weight="700">○</text><text x="46.7" y="312.0" fill="#c9d4e5" font-weight="400">Underpowered pad_pick_rate — MDE 0.074 &gt; 0.050 floor</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.303;0.315;0.9;1" calcMode="linear"/><text x="28.0" y="338.0" fill="#fb923c" font-weight="700">▲</text><text x="46.7" y="338.0" fill="#c9d4e5" font-weight="400">Template sensitivity — paraphrases flip 30.4%  (κ = 0.59)</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.342;0.354;0.9;1" calcMode="linear"/><text x="28.0" y="390.0" fill="#7aa2f7" font-weight="700">## position</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.381;0.393;0.9;1" calcMode="linear"/><text x="28.0" y="416.0" fill="#8b98ac" font-weight="400">Metric               Estimate [95% CI]        q      MDE   Verdict</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.420;0.432;0.9;1" calcMode="linear"/><text x="28.0" y="442.0" fill="#c9d4e5" font-weight="400">first_pick_rate      0.647 [0.603, 0.692]   0.002   0.064</text><text x="570.3" y="442.0" fill="#f87171" font-weight="700">✗</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.459;0.471;0.9;1" calcMode="linear"/><text x="28.0" y="468.0" fill="#c9d4e5" font-weight="400">positional_mcnemar   0.875 [0.753, 0.941]  &lt;0.001   0.202</text><text x="570.3" y="468.0" fill="#f87171" font-weight="700">✗</text></g><g opacity="0"><animate attributeName="opacity" dur="12.0s" repeatCount="indefinite" values="0;0;1;1;0" keyTimes="0;0.498;0.510;0.9;1" calcMode="linear"/><text x="28.0" y="520.0" fill="#8b98ac" font-weight="400">Flags:</text><text x="93.5" y="520.0" fill="#f87171" font-weight="700">position_bias_detected</text></g>
