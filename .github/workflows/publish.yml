# Publishes to PyPI via trusted publishing (OIDC — no API token stored).
# Trigger: publishing a GitHub Release (tag vX.Y.Z).
# One-time setup on pypi.org (after the project name exists or as a
# "pending publisher"): Account -> Publishing -> add GitHub publisher
#   owner: Effram360, repo: judgecal, workflow: publish.yml, environment: pypi
name: Publish

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
