name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # setup-uv@v5 with python-version creates AND activates a venv in
      # the workspace; install into it (no --system) so the `ruff` on
      # PATH is the one we installed. Pin the major: v6 made activation
      # opt-in (activate-environment: true).
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install
        run: uv pip install -e ".[dev,inspect]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src/judgecal

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Same venv-activation note as the lint job: install into the venv
      # the action created (no --system); `python` on PATH is that venv.
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Pytest (fast suite, no network)
        run: python -m pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: uv build
      - name: Install wheel into a fresh venv
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
      - name: CLI smoke (version + offline demo)
        run: |
          /tmp/smoke/bin/judgecal --version
          /tmp/smoke/bin/judgecal demo --n 30 --bias position=0.8 --seed 7
